<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quote Generator for Upnote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .date {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .quote-section {
            margin: 30px 0;
        }

        .quote-icon {
            font-size: 40px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .quote-text {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 15px;
            font-style: italic;
        }

        .quote-author {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .copy-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .new-quote-btn {
            background: #f0f0f0;
            color: #333;
            flex: 1;
            min-width: 150px;
        }

        .new-quote-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .copy-feedback {
            font-size: 12px;
            color: #667eea;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 500;
        }

        .instructions {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 30px;
            border-radius: 4px;
            text-align: left;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .instructions strong {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="date" id="dateDisplay"></div>
    
    <div class="quote-section">
        <div class="quote-icon">✝️</div>
        <div class="quote-text" id="quoteText"></div>
        <div class="quote-author" id="quoteAuthor"></div>
    </div>

    <div class="button-group">
        <button class="copy-btn" onclick="copyToClipboard()">📋 Copy to Upnote</button>
        <button class="new-quote-btn" onclick="generateNewQuote()">🎲 Another Quote</button>
    </div>

    <div class="copy-feedback" id="feedback"></div>

    <div class="instructions">
        <strong>📝 How to use:</strong><br>
        1. Click "Copy to Upnote" to copy the quote with today's date<br>
        2. Paste it into your Upnote daily quote section<br>
        3. Click "Another Quote" if you want a different one<br>
        4. Bookmark this page to use it every morning! 🌅
    </div>
</div>

<script>
    let currentQuote = null;

    function getDateString() {
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        return today.toLocaleDateString('en-US', options);
    }

    // Backup verses in case the internet/API is unavailable
    const backupQuotes = [
        { text: "I can do all things through Christ which strengtheneth me.", author: "Philippians 4:13" },
        { text: "Trust in the LORD with all thine heart; and lean not unto thine own understanding.", author: "Proverbs 3:5" },
        { text: "For I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil, to give you an expected end.", author: "Jeremiah 29:11" },
        { text: "The LORD is my shepherd; I shall not want.", author: "Psalm 23:1" },
        { text: "But they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles.", author: "Isaiah 40:31" },
        { text: "And we know that all things work together for good to them that love God.", author: "Romans 8:28" },
        { text: "Be strong and of a good courage; be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.", author: "Joshua 1:9" },
        { text: "This is the day which the LORD hath made; we will rejoice and be glad in it.", author: "Psalm 118:24" }
    ];

    async function fetchQuoteFromAPI() {
        try {
            // bible-api.com: free, no key needed, supports browsers (CORS), King James Version
            const response = await fetch('https://bible-api.com/?random=verse&translation=kjv');
            if (!response.ok) throw new Error('API responded with an error');
            const data = await response.json();
            return {
                text: data.text.trim(),
                author: data.reference
            };
        } catch (error) {
            console.error('Error fetching verse, using backup:', error);
            // Pick a random backup verse — no error shown to the user
            return backupQuotes[Math.floor(Math.random() * backupQuotes.length)];
        }
    }

    async function generateNewQuote() {
        document.getElementById('feedback').textContent = '⏳ Loading new quote...';
        currentQuote = await fetchQuoteFromAPI();
        displayQuote();
        document.getElementById('feedback').textContent = '';
    }

    function displayQuote() {
        document.getElementById('quoteText').textContent = `"${currentQuote.text}"`;
        document.getElementById('quoteAuthor').textContent = `— ${currentQuote.author}`;
    }

    function copyToClipboard() {
        const dateText = document.getElementById('dateDisplay').textContent;
        const textToCopy = `Daily Quote - ${dateText}\n\n"${currentQuote.text}"\n— ${currentQuote.author}`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const feedback = document.getElementById('feedback');
            feedback.textContent = '✅ Copied! Ready to paste into Upnote';
            setTimeout(() => {
                feedback.textContent = '';
            }, 3000);
        }).catch(err => {
            document.getElementById('feedback').textContent = '❌ Copy failed. Try again!';
        });
    }

    // Initialize
    async function init() {
        document.getElementById('dateDisplay').textContent = getDateString();
        currentQuote = await fetchQuoteFromAPI();
        displayQuote();
    }

    init();
</script>

</body>
</html>
